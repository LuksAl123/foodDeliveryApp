<ion-header>
  <ion-toolbar>
    <ion-title>
      Posts
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <!-- <ion-item *ngFor="let post of posts | async ; trackBy: trackByFn"> -->
    <ion-item *ngFor="let post of posts; trackBy: trackByFn" (click)="navigateToPost(post)" [detail]="true" class="post">
      <ion-label>
        {{ post?.title }}
        <p class="ion-text-wrap">
          {{ post?.body }}
        </p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
