<ion-header>
  <ion-toolbar>
    <ion-title>
      Posts
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="createPost()">
        <ion-icon name="add"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
  <!-- <ion-item *ngFor="let post of posts | async ; trackBy: trackByFn"> -->
    <ion-item *ngFor="let post of posts; let i = index; trackBy: trackByFn">
      <ion-item-sliding #itemSliding>
        <ion-item (click)="navigateToPost(post)" [detail]="true" class="post">
          <ion-label>
            {{ post?.title }}
            <p class="ion-text-wrap">
              {{ post?.body }}
            </p>
          </ion-label>
        </ion-item>

        <ion-item-options side="end">
          <ion-item-option color="secondary" (click)="updatePost(post, itemSliding, i)">Edit</ion-item-option>
          <ion-item-option color="danger" (click)="deletePost(post, itemSliding)">Delete</ion-item-option>
        </ion-item-options>

      </ion-item-sliding>
    </ion-item>
  </ion-list>
</ion-content>
